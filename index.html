<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Locked In</title>
    <style>
      /* pre-React paint: never white, and a pixel loader until the bundle mounts */
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0a0b;
      }
      #root {
        height: 100%;
      }
      .boot {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        font-family: ui-monospace, Consolas, monospace;
      }
      .boot-px {
        display: flex;
        gap: 6px;
      }
      .boot-px span {
        width: 12px;
        height: 12px;
        background: #d4ff3f;
        animation: boot-hop 0.9s steps(2, end) infinite;
      }
      .boot-px span:nth-child(2) {
        animation-delay: 0.15s;
      }
      .boot-px span:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes boot-hop {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.45;
        }
        50% {
          transform: translateY(-9px);
          opacity: 1;
        }
      }
      .boot-t {
        color: #55555e;
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot">
        <div class="boot-px"><span></span><span></span><span></span></div>
        <div class="boot-t">locked in</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
